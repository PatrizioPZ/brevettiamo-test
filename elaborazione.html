<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elaborazione IA — BrevettIAmo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .elaborazione-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        
        .spinner-ia {
            width: 80px;
            height: 80px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .progress-bar {
            width: 100%;
            max-width: 400px;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin: 20px auto;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            border-radius: 4px;
            transition: width 0.5s ease;
            width: 0%;
        }
        
        .status-text {
            font-size: 16px;
            color: #666;
            margin: 15px 0;
            min-height: 24px;
        }
        
        .status-detail {
            font-size: 13px;
            color: #999;
            margin-top: 8px;
        }
        
        .error-box {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 20px;
            margin: 20px auto;
            max-width: 500px;
            display: none;
        }
        
        .error-box.visible {
            display: block;
        }
        
        .error-box h3 {
            color: #dc2626;
            margin-bottom: 10px;
        }
        
        .retry-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            margin-top: 15px;
        }
        
        .retry-btn:hover {
            background: #1d4ed8;
        }
        
        .fallback-btn {
            background: #6b7280;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            margin-left: 10px;
        }
        
        .info-box {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            padding: 15px;
            margin: 20px auto;
            max-width: 500px;
            font-size: 14px;
            color: #1e40af;
        }
        
        .model-badge {
            display: inline-block;
            background: #dbeafe;
            color: #1e40af;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="elaborazione-container">
        <h1>Elaborazione in corso</h1>
        <p style="color: #666; margin-bottom: 30px;">L'IA sta analizzando la tua richiesta...</p>
        
        <div id="spinner" class="spinner-ia"></div>
        
        <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
        </div>
        
        <div id="statusText" class="status-text">Inizializzazione...</div>
        <div id="statusDetail" class="status-detail"></div>
        
        <div id="modelBadge" class="model-badge" style="display: none;"></div>
        
        <div id="errorBox" class="error-box">
            <h3>Errore durante l'elaborazione</h3>
            <p id="errorMessage"></p>
            <div id="errorDetail" style="font-size: 12px; color: #666; margin-top: 8px;"></div>
            <div style="margin-top: 15px;">
                <button class="retry-btn" onclick="riprova()">Riprova</button>
                <button class="fallback-btn" onclick="usaFallback()">Usa template statico</button>
            </div>
        </div>
        
        <div id="infoBox" class="info-box" style="display: none;">
            <strong>Suggerimento:</strong> <span id="infoText"></span>
        </div>
    </div>

    <!-- Script di configurazione e motore IA -->
    <script src="config.js"></script>
    <script src="js/prompts.js"></script>
    <script src="js/ia-engine.js"></script>
    
    <script>
        // ============================================
        // PULIZIA LOCALSTORAGE - FORZA NUOVA CHIAMATA
        // ============================================
        localStorage.removeItem('brevettiamo_risultato_ia');
        localStorage.removeItem('brevettiamo_ia_meta');
        localStorage.removeItem('brevettiamo_use_fallback');
        console.log('Cache pulita - forzo nuova chiamata IA');
        
        // Recupera dati dalla pagina precedente
        const servizioId = localStorage.getItem('brevettiamo_servizio_id');
        const servizioNome = localStorage.getItem('brevettiamo_servizio_nome');
        const descrizione = localStorage.getItem('brevettiamo_descrizione');
        const note = localStorage.getItem('brevettiamo_note');
        const files = JSON.parse(localStorage.getItem('brevettiamo_files') || '[]');
        
        const statusText = document.getElementById('statusText');
        const statusDetail = document.getElementById('statusDetail');
        const progressFill = document.getElementById('progressFill');
        const errorBox = document.getElementById('errorBox');
        const errorMessage = document.getElementById('errorMessage');
        const errorDetail = document.getElementById('errorDetail');
        const modelBadge = document.getElementById('modelBadge');
        const infoBox = document.getElementById('infoBox');
        const infoText = document.getElementById('infoText');
        
        let elaborazioneInCorso = false;
        
        // Messaggi di progresso simulati
        const messaggiProgresso = [
            { pct: 10, msg: 'Analisi della descrizione...', detail: 'Estrazione elementi tecnici chiave' },
            { pct: 25, msg: 'Preparazione del prompt...', detail: 'Selezione modello IA ottimale' },
            { pct: 40, msg: 'Connessione con l\'IA...', detail: 'Handshake con proxy Supabase' },
            { pct: 55, msg: 'Generazione in corso...', detail: 'Elaborazione documento professionale' },
            { pct: 70, msg: 'Raffinamento output...', detail: 'Formattazione e strutturazione' },
            { pct: 85, msg: 'Verifica qualita...', detail: 'Controllo completezza e coerenza' },
            { pct: 95, msg: 'Finalizzazione...', detail: 'Salvataggio risultato' }
        ];
        
        async function avviaElaborazione() {
            if (elaborazioneInCorso) return;
            elaborazioneInCorso = true;
            
            // Verifica dati
            if (!servizioId || !descrizione) {
                mostraErrore('Dati mancanti', 'Torna a descrizione.html e completa il form.');
                return;
            }
            
            // Verifica proxy configurato
            if (!IAEngine.isConfigurato()) {
                mostraErrore(
                    'Proxy non configurato',
                    'Verifica che config.js contenga PROXY_URL corretto.'
                );
                return;
            }
            
            // Avvia progresso simulato
            let msgIndex = 0;
            const progressInterval = setInterval(() => {
                if (msgIndex < messaggiProgresso.length) {
                    const step = messaggiProgresso[msgIndex];
                    progressFill.style.width = step.pct + '%';
                    statusText.textContent = step.msg;
                    statusDetail.textContent = step.detail;
                    msgIndex++;
                }
            }, 1500);
            
            // Crea motore IA e chiama
            const engine = new IAEngine();
            
            try {
                const risultato = await engine.chiama(servizioId, descrizione, files, 'testo');
                
                clearInterval(progressInterval);
                
                if (risultato.success) {
                    // Successo!
                    progressFill.style.width = '100%';
                    statusText.textContent = 'Completato!';
                    statusDetail.textContent = 'Generato in ' + risultato.tempo + 'ms | Tokens: ' + risultato.tokens.total;
                    modelBadge.textContent = risultato.modello;
                    modelBadge.style.display = 'inline-block';
                    
                    // Salva metadati aggiuntivi
                    localStorage.setItem('brevettiamo_ia_meta', JSON.stringify({
                        modello: risultato.modello,
                        tokens: risultato.tokens,
                        tempo: risultato.tempo,
                        tentativi: risultato.tentativi,
                        timestamp: new Date().toISOString()
                    }));
                    
                    // Redirect a risultato dopo 1.5s
                    setTimeout(() => {
                        window.location.href = 'risultato.html';
                    }, 1500);
                    
                } else {
                    // Fallimento con retry esauriti
                    clearInterval(progressInterval);
                    mostraErrore(
                        'L\'IA non ha risposto correttamente',
                        'Errore: ' + risultato.errore + '\n\nTentativi effettuati: ' + risultato.tentativi.length + '\n\nPuoi riprovare o usare il template statico.'
                    );
                }
                
            } catch (errore) {
                clearInterval(progressInterval);
                mostraErrore('Errore imprevisto', errore.message);
            }
        }
        
        function mostraErrore(titolo, dettaglio) {
            document.getElementById('spinner').style.display = 'none';
            progressFill.style.width = '0%';
            statusText.textContent = 'Elaborazione fallita';
            statusDetail.textContent = '';
            
            errorBox.classList.add('visible');
            errorMessage.textContent = titolo;
            errorDetail.textContent = dettaglio;
            elaborazioneInCorso = false;
        }
        
        function riprova() {
            errorBox.classList.remove('visible');
            document.getElementById('spinner').style.display = 'block';
            progressFill.style.width = '0%';
            statusText.textContent = 'Inizializzazione...';
            statusDetail.textContent = '';
            avviaElaborazione();
        }
        
        function usaFallback() {
            // Salva flag per usare template statico
            localStorage.setItem('brevettiamo_use_fallback', 'true');
            window.location.href = 'risultato.html';
        }
        
        // Avvia automaticamente al caricamento
        document.addEventListener('DOMContentLoaded', () => {
            // Piccolo delay per permettere al browser di renderizzare
            setTimeout(avviaElaborazione, 500);
        });
    </script>
    <!-- BREVETTIAMO E2E -->
<script src="e2e-module.js"></script>
<script>
  if (typeof BrevettIAmoE2E !== 'undefined') {
    BrevettIAmoE2E.init();
  }
</script>
</body>
</html>
