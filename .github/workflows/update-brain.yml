name: Update Brain - Brevetti EPO

on:
  # Esecuzione mensile (1° del mese alle 3:00 AM UTC)
  schedule:
    - cron: '0 3 1 * *'

  # Esecuzione manuale (da GitHub Actions tab)
  workflow_dispatch:

jobs:
  update-brain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run update script
        env:
          EPO_CONSUMER_KEY: ${{ secrets.EPO_CONSUMER_KEY }}
          EPO_CONSUMER_SECRET: ${{ secrets.EPO_CONSUMER_SECRET }}
        run: python scripts/update_brain.py

      - name: Check if data changed
        id: verify-changed-files
        run: |
          if git diff --quiet data/contesto_ai.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/contesto_ai.json
          git commit -m "Auto-update: Brevetti EPO $(date +%Y-%m-%d)"
          git push
