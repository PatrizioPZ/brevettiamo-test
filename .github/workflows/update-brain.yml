name: update-brain

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update-brain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate update_brain.py
        run: |
          mkdir -p scripts
          cat > scripts/update_brain.py << 'PYEOF'
          import datetime
          import json
          import os
          import sys
          import time
          import requests

          EPO_API_URL = "https://ops.epo.org/3.2/rest-services/published-data/search"
          EPO_AUTH_URL = "https://ops.epo.org/3.2/auth/accesstoken"
          OUTPUT_FILE = "data/contesto_ai.json"
          MAX_RISULTATI = 100
          ANNI_STORICO = 5
          EPO_CONSUMER_KEY = os.environ.get("EPO_CONSUMER_KEY", "")
          EPO_CONSUMER_SECRET = os.environ.get("EPO_CONSUMER_SECRET", "")

          def ottieni_token_epo():
              if not EPO_CONSUMER_KEY or not EPO_CONSUMER_SECRET:
                  print("ERRORE: Credenziali EPO mancanti")
                  return None
              try:
                  r = requests.post(EPO_AUTH_URL, auth=(EPO_CONSUMER_KEY, EPO_CONSUMER_SECRET),
                                    data={"grant_type": "client_credentials"}, timeout=30)
                  r.raise_for_status()
                  return r.json()["access_token"]
              except Exception as e:
                  print(f"Errore auth: {e}")
                  return None

          def cerca_brevetti_it(token, range_inizio=1):
              headers = {"Authorization": f"Bearer {token}", "Accept": "application/json"}
              # Query semplice: tutti i brevetti con numero pubblicazione IT
              query = "pn=IT*"
              params = {"q": query, "Range": f"{range_inizio}-{range_inizio + 24}"}
              try:
                  r = requests.get(EPO_API_URL, headers=headers, params=params, timeout=60)
                  if r.status_code == 401:
                      return None
                  r.raise_for_status()
                  return r.json()
              except Exception as e:
                  print(f"Errore EPO: {e}")
                  return None

          def estrai_dati_brevetto(doc):
              try:
                  biblio = doc.get("bibliographic-data", {})
                  t = biblio.get("invention-title", [])
                  titolo = "N/A"
                  if isinstance(t, list) and t:
                      titolo = t[0].get("$", "N/A")
                  elif isinstance(t, dict):
                      titolo = t.get("$", "N/A")
                  dn = biblio.get("publication-reference", {}).get("document-id", [{}])[0]
                  numero = dn.get("doc-number", "N/A")
                  d = dn.get("date", "N/A")
                  if d != "N/A":
                      d = f"{d[:4]}-{d[4:6]}-{d[6:]}"
                  c = []
                  ip = biblio.get("classifications-ipcr", {}).get("classification-ipcr", [])
                  if not isinstance(ip, list):
                      ip = [ip]
                  for i in ip:
                      if isinstance(i, dict):
                          c.append(i.get("text", ""))
                  l = biblio.get("locarno-classification", {})
                  lc = ""
                  if l:
                      ls = l.get("locarno-class", [])
                      if isinstance(ls, list) and ls:
                          lc = ls[0].get("text", "")
                      elif isinstance(ls, dict):
                          lc = ls.get("text", "")
                  lk = f"https://worldwide.espacenet.com/patent/search?q=pn%3D{numero}"
                  return {"titolo": titolo, "numero_brevetto": numero, "data_approvazione": d,
                          "classificazioni": c, "locarno": lc, "disegni_url": lk,
                          "caratteristiche_approvate": [], "errori_comuni_evitati": []}
              except Exception as e:
                  print(f"Errore estrazione: {e}")
                  return None

          def mappa_cat(lc):
              m = {"06-01": "06-01", "06-02": "06-01", "14-03": "14-03",
                    "12-05": "12-05", "15-01": "15-01", "26-05": "26-05"}
              b = lc[:5] if len(lc) >= 5 else lc
              return m.get(b, "altro")

          def aggiorna(nuovi):
              db = {"metadata": {}, "categorie": {}, "regole_generali_uibm": {}}
              if os.path.exists(OUTPUT_FILE):
                  with open(OUTPUT_FILE, "r", encoding="utf-8") as f:
                      db = json.load(f)
              db["metadata"]["ultimo_aggiornamento"] = datetime.datetime.now().isoformat()
              db["metadata"]["fonte"] = "EPO/UIBM"
              for bv in nuovi:
                  cat = mappa_cat(bv.get("locarno", ""))
                  if cat not in db["categorie"]:
                      db["categorie"][cat] = {"nome": f"Categoria {cat}", "classe_locarno": cat,
                                              "classe_cpc": "", "esempi_approvati": [], "pattern_approvazione": {}}
                  es = [e["numero_brevetto"] for e in db["categorie"][cat]["esempi_approvati"]]
                  if bv["numero_brevetto"] not in es:
                      db["categorie"][cat]["esempi_approvati"].append(bv)
              db["metadata"]["totale_categorie"] = len(db["categorie"])
              db["metadata"]["totale_brevetti"] = sum(
                  len(c["esempi_approvati"]) for c in db["categorie"].values())
              os.makedirs(os.path.dirname(OUTPUT_FILE), exist_ok=True)
              with open(OUTPUT_FILE, "w", encoding="utf-8") as f:
                  json.dump(db, f, indent=2, ensure_ascii=False)
              print(f"Aggiornati {db['metadata']['totale_brevetti']} brevetti")

          def estrai_documenti(dati):
              try:
                  wd = dati.get("ops:world-patent-data", {})
                  bs = wd.get("ops:biblio-search", {})
                  sr = bs.get("ops:search-result", {})
                  if isinstance(sr, dict):
                      docs = sr.get("ops:exchange-documents", [])
                  elif isinstance(sr, list):
                      docs = sr[0].get("ops:exchange-documents", []) if sr else []
                  else:
                      docs = []
                  if not docs:
                      return []
                  return docs if isinstance(docs, list) else [docs]
              except Exception as e:
                  print(f"Errore parsing: {e}")
                  return []

          def main():
              print("=" * 60)
              print("BREVETTIAMO - Update Brain v1.0")
              print("=" * 60)
              token = ottieni_token_epo()
              if not token:
                  print("Token mancante, creo database vuoto")
                  aggiorna([])
                  return
              print("Token OK")
              tutti = []
              rstart = 1
              retry = 0
              MAX_RETRY = 3
              while rstart <= MAX_RISULTATI:
                  print(f"Pagina {rstart}-{rstart + 24}...")
                  dati = cerca_brevetti_it(token, rstart)
                  if dati is None:
                      retry += 1
                      if retry > MAX_RETRY:
                          print("Troppi errori consecutivi, interrompo")
                          break
                      token = ottieni_token_epo()
                      if not token:
                          break
                      continue
                  retry = 0
                  risultati = estrai_documenti(dati)
                  if not risultati:
                      print("Nessun risultato")
                      break
                  for doc in risultati:
                      b = estrai_dati_brevetto(doc)
                      if b:
                          tutti.append(b)
                  print(f"Totali: {len(tutti)}")
                  tot = dati.get("ops:world-patent-data", {}).get("ops:biblio-search", {}).get("@total-result-count", "0")
                  try:
                      if rstart + 24 >= int(tot):
                          break
                  except (ValueError, TypeError):
                      break
                  rstart += 25
                  time.sleep(2)
              print(f"\nTotale estratti: {len(tutti)}")
              aggiorna(tutti)
              print(f"Salvato in: {OUTPUT_FILE}")
              print("\nCompletato!")

          if __name__ == "__main__":
              main()
          PYEOF

      - name: Run update script
        env:
          EPO_CONSUMER_KEY: ${{ secrets.EPO_CONSUMER_KEY }}
          EPO_CONSUMER_SECRET: ${{ secrets.EPO_CONSUMER_SECRET }}
        run: python scripts/update_brain.py

      - name: Check if data changed
        id: verify-changed-files
        run: |
          if git diff --quiet data/contesto_ai.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/contesto_ai.json
          git commit -m "Auto-update contesto_ai.json"
          git push
