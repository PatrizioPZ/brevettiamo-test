<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrevettIAmo - Regista Servizi</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Libre Baskerville', Georgia, serif;
    background: #f5f0e8;
    min-height: 100vh;
    color: #3d2b1f;
}

.pergamena {
    max-width: 900px;
    margin: 40px auto;
    background: #faf6f0;
    border: 2px solid #c9a96e;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(61,43,31,0.15), inset 0 0 60px rgba(201,169,110,0.1);
    padding: 50px;
    position: relative;
}

.logo {
    text-align: center;
    margin-bottom: 30px;
}
.logo h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.8rem;
    color: #8b0000;
    letter-spacing: 2px;
}
.logo p {
    font-style: italic;
    color: #8b7355;
    font-size: 0.9rem;
    margin-top: 5px;
}

.login-box {
    max-width: 400px;
    margin: 0 auto;
    padding: 30px;
    background: rgba(201,169,110,0.08);
    border: 1px solid #d4c4a8;
    border-radius: 4px;
}

.login-box input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: 1px solid #d4c4a8;
    border-radius: 4px;
    background: #fffef8;
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 14px;
}

.btn {
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    letter-spacing: 2px;
    padding: 16px 40px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.3s;
    background: #c9a96e;
    color: #fff;
    box-shadow: 0 4px 15px rgba(201,169,110,0.3);
    width: 100%;
}

.btn:hover {
    background: #b8985a;
    transform: translateY(-2px);
}

.servizio-info {
    text-align: center;
    margin-bottom: 20px;
    padding: 15px;
    background: rgba(139,0,0,0.05);
    border: 1px dashed #8b0000;
    border-radius: 4px;
}
.servizio-info h3 {
    font-family: 'Cinzel', serif;
    color: #8b0000;
    font-size: 1.1rem;
}
.servizio-info p {
    color: #5a4a3a;
    font-size: 0.9rem;
    margin-top: 5px;
}

.servizi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-top: 30px;
}

.servizio-card {
    background: rgba(201,169,110,0.08);
    border: 1px solid #d4c4a8;
    border-radius: 4px;
    padding: 25px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
}
.servizio-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(61,43,31,0.12);
    border-color: #c9a96e;
}
.servizio-card h4 {
    font-family: 'Cinzel', serif;
    color: #8b0000;
    font-size: 1rem;
    margin-bottom: 8px;
}
.servizio-card p {
    font-size: 0.85rem;
    color: #8b7355;
}

#flusso-iframe {
    width: 100%;
    height: 95vh;
    border: 2px solid #c9a96e;
    border-radius: 4px;
    display: none;
    background: #faf6f0;
}

.user-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: #3d2b1f;
    color: #f5f0e8;
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
}
.user-bar a {
    color: #c9a96e;
    text-decoration: none;
    cursor: pointer;
}
.user-bar a:hover {
    text-decoration: underline;
}

.hidden { display: none !important; }

.stato-login {
    text-align: center;
    padding: 20px;
    color: #8b7355;
    font-style: italic;
}

@media (max-width: 600px) {
    .pergamena { padding: 25px; margin: 20px; }
    .servizi-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="user-bar" class="user-bar hidden">
    <span id="user-email">Utente</span>
    <div>
        <a onclick="tornaMenu()">Menu Servizi</a> | 
        <a onclick="logout()">Esci</a>
    </div>
</div>

<div class="pergamena" id="login-panel">
    <div class="logo">
        <h1>BREVETTIAMO</h1>
        <p>Regista Servizi</p>
    </div>
    
    <div class="servizio-info" id="servizio-info">
        <h3>Servizio selezionato</h3>
        <p id="nome-servizio">Caricamento...</p>
    </div>

    <div class="login-box" id="login-box">
        <input type="email" id="email" placeholder="Email" autocomplete="email">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">
        <button class="btn" onclick="login()">ENTRA NEL SERVIZIO</button>
        <div class="stato-login" id="login-msg"></div>
    </div>
</div>

<div class="pergamena hidden" id="menu-panel">
    <div class="logo">
        <h1>BREVETTIAMO</h1>
        <p>Seleziona un servizio</p>
    </div>
    
    <div class="servizi-grid" id="servizi-grid">
    </div>
</div>

<iframe id="flusso-iframe" name="flusso-frame"></iframe>

<script>
const SERVIZI = {
    'servizio-tavole': {
        nome: 'Tavole Tecniche',
        descrizione: 'Generazione tavole tecniche in formato SVG',
        icona: 'T',
        colore: '#8b0000'
    },
    'servizio-cad': {
        nome: 'Disegni CAD Pro',
        descrizione: 'Disegni professionali in formato CAD',
        icona: 'D',
        colore: '#2c5f2d'
    },
    'servizio-ricerca': {
        nome: 'Ricerca Prior Art',
        descrizione: 'Analisi stato dell\'arte',
        icona: 'R',
        colore: '#1a5276'
    },
    'servizio-rivendicazioni': {
        nome: 'Rivendicazioni',
        descrizione: 'Stesura rivendicazioni brevettuali',
        icona: 'V',
        colore: '#6c3483'
    },
    'servizio-report': {
        nome: 'Report Completo',
        descrizione: 'Report tecnico-brevettuale',
        icona: 'P',
        colore: '#7d6608'
    }
};

let servizioCorrente = null;
let utenteLoggato = null;

document.addEventListener('DOMContentLoaded', function() {
    const params = new URLSearchParams(window.location.search);
    servizioCorrente = params.get('servizio');
    mostraLogin();
});

function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const msg = document.getElementById('login-msg');
    
    if (!email || !password) {
        msg.textContent = 'Inserisci email e password';
        msg.style.color = '#8b0000';
        return;
    }
    
    utenteLoggato = {
        email: email,
        id: 'user_' + Date.now(),
        loginTime: Date.now()
    };
    
    localStorage.setItem('brevettiamo_user', JSON.stringify(utenteLoggato));
    mostraMenu();
}

function logout() {
    localStorage.removeItem('brevettiamo_user');
    utenteLoggato = null;
    location.reload();
}

function mostraLogin() {
    document.getElementById('login-panel').classList.remove('hidden');
    document.getElementById('menu-panel').classList.add('hidden');
    document.getElementById('flusso-iframe').style.display = 'none';
    document.getElementById('user-bar').classList.add('hidden');
    
    const info = document.getElementById('nome-servizio');
    if (servizioCorrente && SERVIZI[servizioCorrente]) {
        const s = SERVIZI[servizioCorrente];
        info.innerHTML = '<strong>' + s.nome + '</strong><br><span style="font-size:0.85rem;color:#8b7355">' + s.descrizione + '</span>';
    } else {
        info.innerHTML = 'Nessun servizio selezionato. Scegli dal menu.';
    }
}

function mostraMenu() {
    document.getElementById('login-panel').classList.add('hidden');
    document.getElementById('menu-panel').classList.remove('hidden');
    document.getElementById('flusso-iframe').style.display = 'none';
    document.getElementById('user-bar').classList.remove('hidden');
    
    if (utenteLoggato) {
        document.getElementById('user-email').textContent = utenteLoggato.email;
    }
    
    const grid = document.getElementById('servizi-grid');
    grid.innerHTML = '';
    
    Object.entries(SERVIZI).forEach(function([id, s]) {
        const card = document.createElement('div');
        card.className = 'servizio-card';
        card.innerHTML = 
            '<div style="font-size:2rem;color:' + s.colore + ';margin-bottom:10px;font-family:\'Cinzel\',serif;font-weight:bold;">' + s.icona + '</div>' +
            '<h4>' + s.nome + '</h4>' +
            '<p>' + s.descrizione + '</p>';
        card.onclick = function() { avviaServizio(id); };
        grid.appendChild(card);
    });
    
    if (servizioCorrente && SERVIZI[servizioCorrente]) {
        avviaServizio(servizioCorrente);
    }
}

function avviaServizio(servizioId) {
    servizioCorrente = servizioId;
    document.getElementById('menu-panel').classList.add('hidden');
    document.getElementById('login-panel').classList.add('hidden');
    
    const iframe = document.getElementById('flusso-iframe');
    iframe.style.display = 'block';
    
    const flussoUrl = '../welcome.html?servizio=' + encodeURIComponent(servizioId);
    iframe.src = flussoUrl;
}

function tornaMenu() {
    document.getElementById('flusso-iframe').style.display = 'none';
    document.getElementById('flusso-iframe').src = '';
    mostraMenu();
}

window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'brevettiamo') {
        if (e.data.action === 'logout') {
            logout();
        } else if (e.data.action === 'torna-menu') {
            tornaMenu();
        }
    }
});
</script>

</body>
</html>
