<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - BrevettIAmo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#1e3a5f 0%,#0f172a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:#fff;border-radius:24px;box-shadow:0 25px 50px rgba(0,0,0,0.25);padding:3rem;width:100%;max-width:420px}
.brand-logo{text-align:center;margin-bottom:2rem}
.brand-logo h2{font-weight:800;color:#1e3a5f;margin:0}
.brand-logo p{color:#64748b;margin-top:.5rem;font-size:.9rem}
.social-btn{display:flex;align-items:center;justify-content:center;gap:.75rem;padding:.875rem;border:2px solid #e2e8f0;border-radius:12px;background:#fff;cursor:pointer;transition:all .2s;font-weight:600;color:#1e293b;text-decoration:none;margin-bottom:.75rem}
.social-btn:hover{border-color:#cbd5e1;background:#f8fafc}
.social-btn i{font-size:1.25rem}
.google i{color:#ea4335}
.apple i{color:#000}
.divider{display:flex;align-items:center;margin:1.5rem 0;color:#94a3b8;font-size:.85rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e2e8f0}
.divider span{padding:0 1rem}
.form-control{padding:.875rem 1rem;border-radius:12px;border:2px solid #e2e8f0;font-size:.95rem}
.form-control:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
.btn-primary{padding:.875rem;border-radius:12px;font-weight:600;font-size:1rem;background:#2563eb;border:none}
.btn-primary:hover{background:#1d4ed8}
.links{text-align:center;margin-top:1.5rem;font-size:.9rem}
.links a{color:#2563eb;text-decoration:none;font-weight:500}
.links a:hover{text-decoration:underline}
.alert{border-radius:12px;border:none;padding:1rem 1.25rem}
.spinner-border{width:1.2rem;height:1.2rem;border-width:.15em}
</style>
</head>
<body>
<div class="login-card">
<div class="brand-logo">
<h2><i class="bi bi-shield-check text-primary"></i> BrevettIAmo</h2>
<p>Accedi al tuo pannello</p>
</div>

<div id="alertBox"></div>

<button class="social-btn google" onclick="loginGoogle()">
<i class="bi bi-google"></i> Continua con Google
</button>

<button class="social-btn apple" onclick="loginApple()">
<i class="bi bi-apple"></i> Continua con Apple
</button>

<div class="divider"><span>oppure</span></div>

<form id="loginForm" onsubmit="return loginEmail(event)">
<div class="mb-3">
<input type="email" class="form-control" id="email" placeholder="Email" required>
</div>
<div class="mb-3">
<input type="password" class="form-control" id="password" placeholder="Password" required>
</div>
<div class="d-flex justify-content-between align-items-center mb-3">
<div class="form-check">
<input class="form-check-input" type="checkbox" id="remember">
<label class="form-check-label text-muted" for="remember" style="font-size:.85rem">Ricordami</label>
</div>
<a href="#" onclick="resetPassword()" style="font-size:.85rem;color:#2563eb;text-decoration:none">Password dimenticata?</a>
</div>
<button type="submit" class="btn btn-primary w-100" id="btnLogin">
<span id="btnText">Accedi</span>
<span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
</button>
</form>

<div class="links">
<p class="text-muted mb-1">Non hai un account?</p>
<a href="#" onclick="showRegister()">Registrati ora</a>
</div>
</div>

<script>
const SUPABASE_URL='https://jtekrvlmqnluvaiapmwb.supabase.co';
const SUPABASE_KEY='sb_publishable_p9WH85YPfwtaKp4tfcDwug_Q9duausk';
const sbClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

function showAlert(msg,type='danger'){
  const box=document.getElementById('alertBox');
  box.innerHTML='<div class="alert alert-'+type+' mb-3"><i class="bi bi-'+(type==='success'?'check-circle':'exclamation-circle')+' me-2"></i>'+msg+'</div>'
}

function setLoading(loading){
  document.getElementById('btnText').textContent=loading?'Accesso...':'Accedi';
  document.getElementById('btnSpinner').classList.toggle('d-none',!loading);
  document.getElementById('btnLogin').disabled=loading;
}

async function loginGoogle(){
  try{
    const{error}=await sbClient.auth.signInWithOAuth({
      provider:'google',
      options:{redirectTo:window.location.origin+'/brevettiamo/dashboard.html'}
    });
    if(error)showAlert('Errore Google: '+error.message);
  }catch(e){showAlert('Errore: '+e.message)}
}

async function loginApple(){
  try{
    const{error}=await sbClient.auth.signInWithOAuth({
      provider:'apple',
      options:{redirectTo:window.location.origin+'/brevettiamo/dashboard.html'}
    });
    if(error)showAlert('Errore Apple: '+error.message);
  }catch(e){showAlert('Errore: '+e.message)}
}

async function loginEmail(e){
  e.preventDefault();
  setLoading(true);
  try{
    const email=document.getElementById('email').value;
    const password=document.getElementById('password').value;
    const{data,error}=await sbClient.auth.signInWithPassword({email,password});
    if(error){
      if(error.message.includes('Email not confirmed')){
        showAlert('Email non confermata. Controlla la tua casella di posta.','warning');
      }else{
        showAlert('Email o password errati.','danger');
      }
      setLoading(false);
      return;
    }
    await redirectAfterLogin(data.user.id);
  }catch(e){
    showAlert('Errore accesso: '+e.message);
    setLoading(false);
  }
}

async function redirectAfterLogin(userId){
  try{
    const{data:profile}=await sbClient.from('profiles').select('role').eq('id',userId).single();
    const role=profile?.role||'user';
    if(role==='admin'){
      window.location.href='admin.html';
    }else{
  window.location.href='welcome.html';
    }
  }catch(e){
window.location.href='welcome.html';
  }
}

async function resetPassword(){
  const email=document.getElementById('email').value;
  if(!email){showAlert('Inserisci prima la tua email.','warning');return}
  try{
    const{error}=await sbClient.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+'/brevettiamo/login.html'});
    if(error){showAlert('Errore: '+error.message);return}
    showAlert('Email di reset inviata! Controlla la tua casella.','success');
  }catch(e){showAlert('Errore: '+e.message)}
}

function showRegister(){
showAlert('Registrazione: usa il form sopra inserendo email e password, poi clicca "Accedi". Se l\'account non esiste, verrà creato automaticamente.','info');
}


</script>
</body>
</html>
